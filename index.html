<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formosa LinguaGarden 雙語家教</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Nunito:wght@400;700&display=swap');
        body { font-family: 'Nunito', 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        
        /* 像素風樣式與溫室系統 */
        .pixel-art { image-rendering: pixelated; image-rendering: crisp-edges; }
        
        #coin-display {
            position: absolute; top: 16px; left: 16px;
            background: rgba(255, 255, 255, 0.95); border: 2px solid #fcd34d;
            padding: 6px 14px; border-radius: 99px;
            font-family: monospace; font-size: 16px; font-weight: bold;
            color: #d97706; display: flex; align-items: center; gap: 6px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 10;
            transition: transform 0.2s;
        }
        
        #plant-pot-btn {
            position: fixed; bottom: 24px; right: 24px;
            width: 64px; height: 64px; background: white;
            border-radius: 50%; border: 3px solid #bfdbfe;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 40; transition: transform 0.2s;
        }
        #plant-pot-btn:hover { transform: scale(1.1) rotate(5deg); }

        #plant-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: none; align-items: center; justify-content: center;
            z-index: 100;
        }
        #plant-card {
            background: white; width: 90%; max-width: 340px;
            border-radius: 24px; padding: 32px 24px; text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); position: relative;
        }
        #plant-visual-container { height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        
        #bloom-overlay {
            position: fixed; inset: 0; background: rgba(255, 255, 255, 0.9);
            z-index: 200; display: none; align-items: center; justify-content: center;
            flex-direction: column; animation: fadeInOut 3s forwards;
        }
        @keyframes fadeInOut { 0% { opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }

        /* 字卡樣式 */
        .card-container { perspective: 1000px; cursor: pointer; margin-bottom: 1rem; }
        .card { width: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; min-height: 120px; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; padding: 1.5rem; border-radius: 1rem; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e5e7eb; }
        .card-back { transform: rotateY(180deg); background: #f8fafc; }
    </style>
</head>
<body class="text-gray-800 min-h-screen p-4 md:p-8">

    <!-- 頂部金幣顯示 -->
    <div id="coin-display" class="hidden">
        <span class="pixel-art text-xl">🌞</span> <span id="user-coins">0</span>
    </div>

    <!-- 登入畫面 -->
    <div id="view-login" class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-8 text-center mt-20">
        <div class="text-6xl mb-4 pixel-art">🪴</div>
        <h1 class="text-2xl font-bold mb-2 text-indigo-600">Formosa LinguaGarden</h1>
        <p class="text-gray-500 mb-6">種下語言的種子，灌溉你的數位花園</p>
        <input type="text" id="username-input" placeholder="請輸入你的名字" class="w-full p-3 border rounded-xl mb-4 text-center focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <button onclick="login()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition">開始培育</button>
    </div>

    <!-- 主控台畫面 -->
    <div id="view-main" class="max-w-3xl mx-auto hidden flex-col gap-6">
        
        <div class="bg-white rounded-3xl shadow-sm p-6 relative">
            <div class="text-right text-sm text-gray-400 mb-4">歡迎, <span id="display-user" class="font-bold text-indigo-500"></span></div>
            
            <h2 class="text-xl font-bold mb-4"><i class="fa-solid fa-wand-magic-sparkles text-indigo-500 mr-2"></i>生成學習任務</h2>
            <div class="flex flex-col gap-4">
                <input type="text" id="topic-input" placeholder="想學習什麼主題？ (例如：環保、科技新聞、點餐)" class="w-full p-3 border rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-300">
                <div class="flex gap-2">
                    <select id="level-select" class="flex-1 p-3 border rounded-xl bg-gray-50 text-sm">
                        <option value="A1 Beginner">入門 (A1)</option>
                        <option value="B1 Intermediate" selected>中級 (B1)</option>
                        <option value="C1 Advanced">進階 (C1)</option>
                    </select>
                    <button onclick="generateContent()" class="flex-2 bg-indigo-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-indigo-700 transition shadow-md">生成講義</button>
                </div>
            </div>
            <div id="loading" class="hidden text-center text-indigo-500 my-4 font-bold animate-pulse">大腦運轉中，請稍候...</div>
        </div>

        <!-- 內容顯示區 -->
        <div id="content-area" class="hidden bg-white rounded-3xl shadow-sm p-6">
            <h2 id="article-title" class="text-2xl font-bold mb-6 text-center text-gray-800"></h2>
            <div id="cards-container"></div>
            <div class="text-center mt-6">
                <button onclick="earnReadingBonus()" class="bg-green-500 text-white font-bold py-2 px-6 rounded-full hover:bg-green-600 transition text-sm shadow-md"><i class="fa-solid fa-check mr-2"></i>我讀完了 (+50 幣)</button>
            </div>
        </div>
    </div>

    <!-- 懸浮溫室按鈕 -->
    <div id="plant-pot-btn" class="hidden" onclick="openPlantModal()" title="我的像素溫室">
        <span class="text-4xl pixel-art">🪴</span>
    </div>

    <!-- 溫室彈出視窗 -->
    <div id="plant-modal" onclick="closePlantModal(event)">
        <div id="plant-card" onclick="event.stopPropagation()">
            <button onclick="closePlantModal(event)" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h3 class="text-xs font-bold text-gray-400 tracking-wider mb-1">台灣原生特展</h3>
            <h2 class="text-2xl font-bold text-indigo-700 mb-6">黃花風鈴木</h2>
            
            <div id="plant-visual-container">
                <div id="plant-visual" class="text-8xl pixel-art">🟫</div>
            </div>

            <div class="bg-gray-50 p-5 rounded-2xl border border-gray-100">
                <p class="text-xs text-gray-500 mb-2">距離金黃花海盛開 (500 幣)</p>
                <div class="w-full bg-gray-200 rounded-full h-3 mb-2 overflow-hidden">
                    <div id="plant-progress-bar" class="bg-yellow-400 h-3 rounded-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p class="text-xl font-mono font-bold text-yellow-600"><span id="plant-coins-status">0</span> / 500</p>
            </div>
            <p id="plant-tips" class="text-sm text-gray-500 mt-4 leading-relaxed">每一次練習，都是最好的灌溉。</p>
        </div>
    </div>

    <!-- 開花慶典 -->
    <div id="bloom-overlay">
        <h1 class="text-8xl mb-6 pixel-art">🌼🌼🌼</h1>
        <h2 class="text-4xl font-bold text-yellow-500 mb-2">黃金花海，燦爛盛開！</h2>
        <p class="text-xl text-gray-600">恭喜你完成挑戰！你的語言花園充滿生機！</p>
    </div>

    <script>
        // ==========================================
        // 🚨 系統設定區 (請填入你的 GAS 網址)
        // ==========================================
        const API_URL = "在此貼上你的_GAS_網頁應用程式網址"; 
        
        let currentUserId = "";
        let userStats = { coins: 0, plantStage: 0 };
        
        // 像素植物階段素材
        const plantAssets = { 0: '🟫', 1: '🌱', 2: '🌳', 3: '🍂', 4: '🌼' };

        // ==========================================
        // ⚙️ 核心 API 呼叫模組
        // ==========================================
        async function callApi(action, payload = {}) {
            payload.action = action;
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            const data = await res.json();
            if (data.status !== 'success') throw new Error(data.message);
            return data;
        }

        // ==========================================
        // 🎮 遊戲化與植物溫室邏輯
        // ==========================================
        async function refreshUserStats() {
            try {
                const res = await callApi('getUserStats', { userId: currentUserId });
                updateGardenUI(res.data);
            } catch(e) { console.error("讀取狀態失敗", e); }
        }

        function updateGardenUI(data) {
            // 觸發開花特效判定
            if (userStats.plantStage === 3 && data.plantStage === 4) { triggerBloomCelebration(); }
            
            userStats = data;
            document.getElementById('user-coins').innerText = userStats.coins;
            document.getElementById('plant-coins-status').innerText = userStats.coins;
            
            const progress = Math.min((userStats.coins / 500) * 100, 100);
            document.getElementById('plant-progress-bar').style.width = `${progress}%`;

            const visualEl = document.getElementById('plant-visual');
            visualEl.innerText = plantAssets[userStats.plantStage] || '🟫';

            const tipsEl = document.getElementById('plant-tips');
            if (userStats.plantStage === 4) tipsEl.innerText = "🏆 你的專屬黃花風鈴木已燦爛盛開！";
            else if (userStats.plantStage === 3) tipsEl.innerText = "綠葉掉光不是枯萎，是在醞釀最美的爆發。";
            else if (userStats.coins >= 300) tipsEl.innerText = "枝葉越來越茂密了，繼續保持閱讀習慣！";
            else tipsEl.innerText = "每一句勇敢的朗讀，都是最好的陽光與水滴。";
        }

        async function rewardCoins(amount) {
            try {
                const res = await callApi('addCoins', { userId: currentUserId, amount: amount });
                updateGardenUI(res.data);
            } catch(e) { console.error("發放獎勵失敗", e); }
        }

        function openPlantModal() { document.getElementById('plant-modal').style.display = 'flex'; }
        function closePlantModal(e) {
            if (e && e.target.id !== 'plant-modal' && !e.target.closest('#plant-card') && e.target.tagName !== 'BUTTON') return;
            document.getElementById('plant-modal').style.display = 'none';
        }
        function triggerBloomCelebration() {
            const overlay = document.getElementById('bloom-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; openPlantModal(); }, 3000); 
        }

        // ==========================================
        // 📚 學習核心邏輯 (生成文章、字卡、發音)
        // ==========================================
        function login() {
            const name = document.getElementById('username-input').value.trim();
            if (!name) return alert("請輸入名字！");
            localStorage.setItem('gem_username', name);
            init();
        }

        async function init() {
            const savedUser = localStorage.getItem('gem_username');
            if (savedUser) {
                currentUserId = savedUser; 
                document.getElementById('display-user').innerText = currentUserId;
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-main').classList.remove('hidden'); 
                document.getElementById('view-main').classList.add('flex');
                document.getElementById('coin-display').classList.remove('hidden');
                document.getElementById('plant-pot-btn').classList.remove('hidden');
                await refreshUserStats(); // 登入時抓取金幣
            }
        }

        async function generateContent() {
            const topic = document.getElementById('topic-input').value || "AI in the future";
            const level = document.getElementById('level-select').value;
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('content-area').classList.add('hidden');
            
            try {
                const res = await callApi('generate', { topic: topic, level: level, len: 'short', scenario: 'article' });
                renderCards(res.data);
            } catch (err) {
                alert("生成失敗：" + err.message);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function renderCards(data) {
            document.getElementById('article-title').innerText = data.title;
            const container = document.getElementById('cards-container');
            container.innerHTML = "";
            
            data.cards.forEach((card, index) => {
                let vocabHtml = card.vocabulary ? card.vocabulary.map(v => 
                    `<div class="flex justify-between items-center bg-gray-50 p-2 rounded mb-2 text-sm border">
                        <div><strong class="text-indigo-600">${v.word}</strong> <span class="text-gray-400 text-xs">/${v.ipa}/</span><br><span class="text-gray-600">${v.def}</span></div>
                        <button onclick="saveWord('${v.word}', '${v.ipa}', '${v.def}', '${escape(card.english)}', '${escape(card.chinese)}', this, event)" class="text-indigo-500 hover:bg-indigo-100 px-3 py-1 rounded font-bold transition" title="加入生字本 (+20幣)">+ 儲存</button>
                    </div>`
                ).join('') : '';

                const cardHtml = `
                <div class="card-container" onclick="this.querySelector('.card').classList.toggle('flipped')">
                    <div class="card">
                        <div class="card-face">
                            <button onclick="playTTS('${escape(card.english)}', event)" class="absolute top-4 right-4 text-gray-400 hover:text-indigo-500"><i class="fa-solid fa-volume-high"></i></button>
                            <p class="text-lg font-bold text-gray-800 pr-8">${card.english}</p>
                        </div>
                        <div class="card-face card-back">
                            <p class="text-md text-gray-600 mb-4 border-b pb-2">${card.chinese}</p>
                            <div class="overflow-y-auto max-h-32" onclick="event.stopPropagation()">${vocabHtml}</div>
                        </div>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
            document.getElementById('content-area').classList.remove('hidden');
        }

        // 儲存單字並獲取金幣獎勵
        async function saveWord(w, i, d, ctxEscaped, ctxChnEscaped, btn, event) {
            event.stopPropagation(); // 防止字卡翻轉
            btn.innerText = "已儲存"; btn.disabled = true; btn.classList.add("opacity-50");
            try {
                await callApi('saveVocab', { userId: currentUserId, word: w, ipa: i, def: d, ctx: unescape(ctxEscaped), ctxChn: unescape(ctxChnEscaped) });
                rewardCoins(20); // 呼叫後端加 20 幣！
            } catch(e) { console.error("儲存失敗", e); }
        }

        // 閱讀完成的加碼獎勵
        function earnReadingBonus() {
            rewardCoins(50);
            alert("太棒了！認真閱讀獲得 50 陽光幣獎勵！");
        }

        // 呼叫後端真人語音
        async function playTTS(textEscaped, event) {
            event.stopPropagation();
            const text = unescape(textEscaped);
            try {
                const res = await callApi('tts', { text: text, voice: 'en-US-Journey-F' });
                const audio = new Audio("data:audio/mp3;base64," + res.data.audioContent);
                audio.play();
            } catch(e) { alert("語音播放失敗：" + e.message); }
        }

        // 啟動程式
        window.onload = init;
    </script>
</body>
</html>
